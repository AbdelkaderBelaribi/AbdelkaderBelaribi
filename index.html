<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Portfolio</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
  color: #222;
  animation: fadeIn 1s ease-in;
}

header {
  text-align: center;
  padding: 60px 20px;
  background: #111;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.section {
  background: white;
  margin-top: 30px;
  padding: 20px;
  border-radius: 10px;

  opacity: 0;
  transform: translateY(30px);
  transition: 0.6s ease;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

img {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
  transition: 0.3s ease;
}

img:hover {
  transform: scale(1.03);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

ul {
  line-height: 1.8;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<header>
  <h1>مرحباً، أنا مصمم جرافيك</h1>
  <p>خريج تسيير وإدارة | متخصص في التصميم البصري</p>
</header>

<div class="container">

  <div class="section">
    <h2>نبذة عني</h2>
    <p>
      أعمل على تطوير مهاراتي في تصميم الشعارات والهوية البصرية
      وأحب إنشاء تصاميم نظيفة وبسيطة.
    </p>
  </div>

  <div class="section">
    <h2>مهاراتي</h2>
    <ul>
      <li>Photoshop</li>
      <li>Illustrator</li>
      <li>Branding</li>
      <li>UI Design</li>
    </ul>
  </div>

  <div class="section">
    <h2>أعمالي</h2>

    <!-- ضع صورك هنا -->
    <img src="work1.jpg">
    <img src="work2.jpg">
  </div>

  <div class="section">
    <h2>تواصل معي</h2>
    <p>Email: yourmail@example.com</p>
  </div>

</div>

<script>
const sections = document.querySelectorAll('.section');

function reveal() {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add('show');
    }
  });
}

window.addEventListener('scroll', reveal);
reveal();
</script>

</body>
</html>
